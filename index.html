<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rain catcher</title> // trash
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            min-height: 100vh;
            background: #1a2f3f;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-wrapper {
            background: #1e3b4c;
            padding: 25px 20px 20px;
            border-radius: 35px 35px 25px 25px;
            box-shadow: 0 15px 0 #0f232f, 0 20px 25px rgba(0,0,0,0.5);
            border-bottom: 3px solid #5f9db2;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 16px;
            background: linear-gradient(180deg, #9fd9ff 0%, #c0e6ff 80%);
            box-shadow: inset 0 -5px 10px rgba(0,30,40,0.3), 0 10px 10px rgba(0,0,0,0.3);
            cursor: none;
            border: 3px solid #ffe68f;
        }

        .score-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #2b4a5a;
            margin-top: 18px;
            padding: 12px 20px;
            border-radius: 60px;
            border: 2px solid #ffcf9a;
            box-shadow: inset 0 2px 5px #1f3540, 0 5px 0 #17323f;
        }

        .score-box {
            background: #1f2e38;
            color: #ffecbb;
            font-size: 28px;
            font-weight: bold;
            padding: 5px 25px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            text-shadow: 0 2px 0 #7f5d38;
            box-shadow: inset 0 -3px 0 #0c1a21, 0 3px 0 #3f5e6b;
        }

        .restart-btn {
            background: #f9b83c;
            border: none;
            color: #222;
            font-size: 20px;
            font-weight: bold;
            padding: 8px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 1px;
            border-bottom: 5px solid #b27d28;
            transition: all 0.07s;
            box-shadow: 0 3px 0 #744f1a;
        }

        .restart-btn:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }

        .restart-btn:hover {
            background: #ffc857;
        }

        .controls {
            color: #cfecf0;
            font-size: 15px;
            margin-top: 12px;
            text-align: center;
            background: #1c3f4b;
            padding: 6px 0;
            border-radius: 30px;
            border: 1px solid #ffd78c;
        }

        .controls span {
            display: inline-block;
            background: #162e38;
            padding: 2px 15px;
            border-radius: 20px;
            margin: 0 4px;
            border: 1px solid #cf9f5a;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="520" height="400"></canvas>
        
        <div class="score-panel">
            <div class="score-box">
                <span id="scoreDisplay">0</span>
            </div>
            <button class="restart-btn" id="resetGame">Retry</button>
        </div>
        
        <div class="controls">
            <span>Mouse</span> or <span>← → Keys</span>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreEl = document.getElementById('scoreDisplay');
            
            const basketW = 95;
            const basketH = 22;
            const dropSize = 9;
            
            let basketX = (canvas.width - basketW) / 2;
            const basketY = canvas.height - basketH - 18;
            
            let rainDrops = [];
            
            let points = 0;
            let playing = true;
            
            let moveLeft = false;
            let moveRight = false;
            const moveSpeed = 6;
            
            let frameCounter = 0;
            
            function refreshScore() {
                scoreEl.innerText = points;
            }
            
            function makeDrop() {
                return {
                    x: Math.random() * (canvas.width - dropSize * 2) + dropSize,
                    y: -dropSize,
                    speed: 1.8 + Math.random() * 4.2,
                    r: dropSize - (Math.random() > 0.7 ? 2 : 0),
                };
            }
            
            function drawScene() {
                const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, '#a5d5f0');
                grad.addColorStop(0.7, '#d4f0ff');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#ffffffdd';
                
                ctx.beginPath();
                ctx.ellipse(90, 45, 40, 25, 0, 0, Math.PI*2);
                ctx.ellipse(130, 35, 45, 28, 0, 0, Math.PI*2);
                ctx.ellipse(170, 45, 30, 20, 0, 0, Math.PI*2);
                ctx.fill();
                
                ctx.fillStyle = '#ffffffc0';
                ctx.beginPath();
                ctx.ellipse(370, 70, 35, 18, 0, 0, Math.PI*2);
                ctx.ellipse(410, 60, 50, 25, 0, 0, Math.PI*2);
                ctx.ellipse(460, 70, 30, 20, 0, 0, Math.PI*2);
                ctx.fill();
                
                for (let d of rainDrops) {
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
                    
                    let gradDrop = ctx.createRadialGradient(d.x-3, d.y-3, 2, d.x, d.y, d.r);
                    gradDrop.addColorStop(0, '#e8f5ff');
                    gradDrop.addColorStop(0.7, '#3d98c9');
                    ctx.fillStyle = gradDrop;
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.arc(d.x-2, d.y-3, 2, 0, Math.PI*2);
                    ctx.fillStyle = '#ffffffc0';
                    ctx.fill();
                }
                
                ctx.shadowColor = '#402818';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetY = 3;
                
                ctx.fillStyle = '#9c6b3e';
                ctx.fillRect(basketX, basketY, basketW, basketH);
                
                ctx.fillStyle = '#c18b4b';
                ctx.fillRect(basketX-6, basketY-6, basketW+12, 7);
                
                ctx.strokeStyle = '#6d4f2b';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 0;
                for (let i = 0; i < 5; i++) {
                    let offset = i * 18;
                    ctx.beginPath();
                    ctx.moveTo(basketX + 10 + offset, basketY-3);
                    ctx.lineTo(basketX + 5 + offset, basketY + basketH + 2);
                    ctx.strokeStyle = '#5d3f1f';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
                
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;
            }
            
            function updateWorld() {
                if (!playing) return;
                
                if (moveLeft && basketX > 5) {
                    basketX -= moveSpeed;
                }
                if (moveRight && basketX < canvas.width - basketW - 5) {
                    basketX += moveSpeed;
                }
                
                if (Math.random() < 0.025) {
                    rainDrops.push(makeDrop());
                }
                
                for (let i = rainDrops.length - 1; i >= 0; i--) {
                    let drop = rainDrops[i];
                    drop.y += drop.speed;
                    
                    if (drop.y + drop.r > basketY && 
                        drop.x > basketX - 3 && 
                        drop.x < basketX + basketW + 3) {
                        
                        rainDrops.splice(i, 1);
                        points++;
                        refreshScore();
                        continue;
                    }
                    
                    if (drop.y + drop.r > canvas.height + 5) {
                        playing = false;
                    }
                }
                
                if (frameCounter % 37 === 0 && playing) {
                    if (Math.random() > 0.3) {
                        rainDrops.push(makeDrop());
                    }
                }
                
                frameCounter++;
            }
            
            function tick() {
                updateWorld();
                drawScene();
                
                if (!playing) {
                    ctx.fillStyle = '#000000aa';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    ctx.font = 'bold 42px "Courier New", monospace';
                    ctx.fillStyle = '#ffded5';
                    ctx.shadowColor = '#aa0000';
                    ctx.shadowBlur = 15;
                    ctx.fillText('GAME OVER', 45, 190);
                    
                    ctx.font = '22px system-ui';
                    ctx.fillStyle = '#fbe49b';
                    ctx.shadowBlur = 10;
                    ctx.fillText('score: ' + points, 180, 270);
                    
                    ctx.shadowBlur = 0;
                }
                
                requestAnimationFrame(tick);
            }
            
            canvas.addEventListener('mousemove', (e) => {
                if (!playing) return;
                
                let rect = canvas.getBoundingClientRect();
                let mousePos = e.clientX - rect.left;
                
                let targetX = mousePos - basketW/2;
                if (targetX < 3) targetX = 3;
                if (targetX > canvas.width - basketW - 3) targetX = canvas.width - basketW - 3;
                
                basketX = targetX;
            });
            
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                    e.preventDefault();
                }
                
                if (!playing) return;
                
                if (e.key === 'ArrowLeft') {
                    moveLeft = true;
                } else if (e.key === 'ArrowRight') {
                    moveRight = true;
                }
            });
            
            window.addEventListener('keyup', (e) => {
                if (e.key === 'ArrowLeft') {
                    moveLeft = false;
                    e.preventDefault();
                } else if (e.key === 'ArrowRight') {
                    moveRight = false;
                    e.preventDefault();
                }
            });
            
            document.getElementById('resetGame').addEventListener('click', () => {
                playing = true;
                rainDrops = [];
                points = 0;
                refreshScore();
                basketX = (canvas.width - basketW) / 2;
                moveLeft = false;
                moveRight = false;
                frameCounter = 0;
            });
            
            refreshScore();
            tick();
            
        })();
    </script>
</body>
</html>
